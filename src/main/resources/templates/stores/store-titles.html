<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Titles Sold in Store')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Titles Sold at Store ID: <span th:text="${targetId}"></span></h2>
        <a th:href="@{/web/stores/operations}" class="btn" style="margin-bottom: 15px;">&larr; Back to Menu</a>
        <table>
            <thead><tr><th>Title ID</th><th>Book Name</th><th>Type</th><th>Price</th></tr></thead>
            <tbody>
                <tr th:each="title : ${titles}">
                    <td th:text="${title.titleId}"></td>
                    <td th:text="${title.titleName}"></td>
                    <td th:text="${title.type}"></td>
                    <td th:text="${title.price}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
