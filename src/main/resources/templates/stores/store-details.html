<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Store Details')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Store Details Record</h2>
        <div style="background: #fdfefe; padding: 20px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 20px;">
            <p><strong>ID:</strong> <span th:text="${store.storId}"></span></p>
            <p><strong>Store Name:</strong> <span th:text="${store.storName}"></span></p>
            <p><strong>Location:</strong> <span th:text="${store.storAddress + ', ' + store.city + ', ' + store.state + ' ' + store.zip}"></span></p>
        </div>
        <a th:href="@{/web/stores/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Back to Menu</a>
        <a th:href="@{/web/stores/get-by-id}" class="btn btn-primary" style="margin-left: 10px;">Search Another Store</a>
    </div>
</body>
</html>
