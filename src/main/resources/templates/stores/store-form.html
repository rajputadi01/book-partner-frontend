<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Store Form')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${formTitle}"></h2>
        
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px;" th:text="${errorMessage}"></div>
        
        <form th:action="${actionUrl}" th:object="${store}" method="post">
            <input type="hidden" name="isUpdate" th:value="${isUpdate}">
            
            <div class="form-group">
                <label>Store ID (4 chars):</label>
                <input type="text" th:field="*{storId}" th:readonly="${isUpdate}" th:style="${isUpdate ? 'background-color: #eee;' : ''}">
                <span class="error" th:if="${#fields.hasErrors('storId')}" th:errors="*{storId}"></span>
            </div>
            <div class="form-group">
                <label>Name:</label>
                <input type="text" th:field="*{storName}">
                <span class="error" th:if="${#fields.hasErrors('storName')}" th:errors="*{storName}"></span>
            </div>
            <div class="form-group">
                <label>Address:</label>
                <input type="text" th:field="*{storAddress}">
                <span class="error" th:if="${#fields.hasErrors('storAddress')}" th:errors="*{storAddress}"></span>
            </div>
            <div class="form-group">
                <label>City:</label>
                <input type="text" th:field="*{city}">
                <span class="error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></span>
            </div>
            <div class="form-group">
                <label>State (2 chars):</label>
                <input type="text" th:field="*{state}">
                <span class="error" th:if="${#fields.hasErrors('state')}" th:errors="*{state}"></span>
            </div>
            <div class="form-group">
                <label>Zip (5 digits):</label>
                <input type="text" th:field="*{zip}">
                <span class="error" th:if="${#fields.hasErrors('zip')}" th:errors="*{zip}"></span>
            </div>
            <button type="submit" class="btn btn-success">Submit Payload</button>
            <a th:href="@{/web/stores/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
