<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{fragments :: head('Book Partner Portal - Team Portfolio')}"></th:block>
    
    <style>
        /* --- OPTION A: Premium Animated Gradient Background --- */
        body { 
            text-align: center; 
            /* Soft mix of off-white, faint primary blue, and pure white */
            background: linear-gradient(-45deg, #f4f7f6, #e0f2fe, #ffffff, #e8f4f8);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* ---------------------------------------------------- */

        .header { margin-top: 60px; margin-bottom: 50px; }
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .header p { color: var(--text-muted); font-size: 18px; }

        .team-container { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin-bottom: 60px; }

        .team-member {
            background-color: var(--card-bg);
            border: 1px solid #eaeaea;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 25px 20px;
            width: 150px;
            text-decoration: none;
            color: var(--dark);
            transition: var(--transition);
        }

        .team-member:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
            border-color: var(--primary);
        }

        .team-member img { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; border: 3px solid #f0f4f8; }
        .team-member h3 { margin: 0; font-size: 18px; }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="header">
        <h1>Book Partner Portal</h1>
        <p>Engineering Team Portfolio & API Dashboard</p>
        <hr style="width: 100px; border: 2px solid var(--primary); margin: 20px auto; border-radius: 2px;">
    </div>

    <div class="team-container">
        <a th:href="@{/portfolio/shireen}" class="team-member">
            <img th:src="@{/images/shireen.jpeg}" alt="Shireen">
            <h3>Shireen</h3>
        </a>
        <a th:href="@{/portfolio/sakshi}" class="team-member">
            <img th:src="@{/images/sakshi.jpeg}" alt="Sakshi">
            <h3>Sakshi</h3>
        </a>
        <a th:href="@{/portfolio/aditya}" class="team-member"> 
            <img th:src="@{/images/aditya.png}" alt="Aditya">
            <h3>Aditya</h3>
        </a>
        <a th:href="@{/portfolio/rajas}" class="team-member">
            <img th:src="@{/images/rajas.png}" alt="Rajas">
            <h3>Rajas</h3>
        </a>
        <a th:href="@{/portfolio/prathamesh}" class="team-member">
            <img th:src="@{/images/prathamesh.png}" alt="Prathamesh">
            <h3>Prathamesh</h3>
        </a>
    </div>

</body>
</html>
