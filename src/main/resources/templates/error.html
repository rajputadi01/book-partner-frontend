<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Oops! Something went wrong')}"></head>
<body style="background-color: #f4f7f6;">
    <div th:replace="~{fragments :: navbar}"></div>
    
    <div class="container" style="max-width: 600px; text-align: center; margin-top: 80px; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        
        <div style="font-size: 70px; margin-bottom: 10px;">😕</div>
        
        <div style="font-size: 60px; font-weight: 800; color: #ff7675; margin-bottom: 5px; line-height: 1;">
            <span th:text="${status != null ? status : '500'}"></span>
        </div>
        
        <h2 style="color: #2d3436; font-weight: 600; margin-bottom: 20px; border-bottom: none;" 
            th:text="${error != null ? error : 'Unexpected Error'}"></h2>
            
        <p style="font-size: 18px; color: #636e72; margin-bottom: 30px; line-height: 1.6;" 
           th:text="${message != null ? message : 'We encountered a hiccup while processing your request. Please check your inputs and try again.'}"></p>

        <div style="display: flex; justify-content: center; gap: 15px;">
            <a href="javascript:history.back()" class="btn" style="background-color: #b2bec3; color: white; border-radius: 25px; padding: 10px 25px;">&larr; Go Back</a>
            <a th:href="@{/}" class="btn" style="background-color: #55efc4; color: #2d3436; font-weight: bold; border-radius: 25px; padding: 10px 25px;">Team Hub</a>
        </div>
        
    </div>
</body>
</html>
