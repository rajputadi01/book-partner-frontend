<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Publishers for Author')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Publishers associated with Author ID: <span th:text="${targetId}"></span></h2>
        <a th:href="@{/web/authors/operations}" class="btn" style="margin-bottom: 15px;">&larr; Back to Menu</a>
        <table>
            <thead><tr><th>Pub ID</th><th>Publisher Name</th><th>City</th></tr></thead>
            <tbody>
                <tr th:each="pub : ${publishers}">
                    <td th:text="${pub.pubId}"></td>
                    <td th:text="${pub.pubName}"></td>
                    <td th:text="${pub.city}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
