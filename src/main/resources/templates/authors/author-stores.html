<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Stores selling Author')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Stores stocking works by Author ID: <span th:text="${targetId}"></span></h2>
        
        <div style="margin-bottom: 20px;">
            <a th:href="@{/web/authors/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Menu</a>
            <a th:href="@{/web/authors/relational/stores}" class="btn btn-primary" style="margin-left: 10px;">Search Another Author</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='storId', dir=${sortBy == 'storId' && dir == 'asc' ? 'desc' : 'asc'}, id=${targetId})}" style="color: white; text-decoration: none;">Store ID <span th:if="${sortBy == 'storId'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='storName', dir=${sortBy == 'storName' && dir == 'asc' ? 'desc' : 'asc'}, id=${targetId})}" style="color: white; text-decoration: none;">Store Name <span th:if="${sortBy == 'storName'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='city', dir=${sortBy == 'city' && dir == 'asc' ? 'desc' : 'asc'}, id=${targetId})}" style="color: white; text-decoration: none;">City <span th:if="${sortBy == 'city'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='state', dir=${sortBy == 'state' && dir == 'asc' ? 'desc' : 'asc'}, id=${targetId})}" style="color: white; text-decoration: none;">State <span th:if="${sortBy == 'state'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="store : ${stores}">
                    <td th:text="${store.storId}"></td>
                    <td th:text="${store.storName}"></td>
                    <td th:text="${store.city}"></td>
                    <td th:text="${store.state}"></td>
                </tr>
                <tr th:if="${totalItems == 0}">
                    <td colspan="4" style="text-align: center; color: #7f8c8d; padding: 20px;">No stores found selling works by this author.</td>
                </tr>
            </tbody>
        </table>

        <div th:if="${totalItems > 0}" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e1e8ed;">
            <span style="font-size: 14px; color: #34495e;">Page <strong th:text="${currentPage}"></strong> of <strong th:text="${totalPages}"></strong></span>
            <div>
                <a th:if="${currentPage > 1}" th:href="@{${endpoint}(page=${currentPage - 1}, sortBy=${sortBy}, dir=${dir}, id=${targetId})}" class="btn" style="background: #bdc3c7; padding: 6px 15px; margin-right: 5px;">&laquo; Prev</a>
                <a th:if="${currentPage < totalPages}" th:href="@{${endpoint}(page=${currentPage + 1}, sortBy=${sortBy}, dir=${dir}, id=${targetId})}" class="btn btn-success" style="padding: 6px 15px;">Next &raquo;</a>
            </div>
        </div>
    </div>
</body>
</html>
