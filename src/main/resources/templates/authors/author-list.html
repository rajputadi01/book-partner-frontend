<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Author Results')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        
        <div style="margin-bottom: 20px;">
            <a th:href="@{/web/authors/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Menu</a>
            <a th:if="${status != null}" th:href="@{/web/authors/filter/contract}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Status</a>
            <a th:if="${city != null}" th:href="@{/web/authors/filter/city}" class="btn btn-primary" style="margin-left: 10px;">Filter Another City</a>
            <a th:if="${state != null}" th:href="@{/web/authors/filter/state}" class="btn btn-primary" style="margin-left: 10px;">Filter Another State</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='auId', dir=${sortBy == 'auId' && dir == 'asc' ? 'desc' : 'asc'}, status=${status}, city=${city}, state=${state})}" style="color: white; text-decoration: none;">ID <span th:if="${sortBy == 'auId'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='auFname', dir=${sortBy == 'auFname' && dir == 'asc' ? 'desc' : 'asc'}, status=${status}, city=${city}, state=${state})}" style="color: white; text-decoration: none;">First Name <span th:if="${sortBy == 'auFname'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='auLname', dir=${sortBy == 'auLname' && dir == 'asc' ? 'desc' : 'asc'}, status=${status}, city=${city}, state=${state})}" style="color: white; text-decoration: none;">Last Name <span th:if="${sortBy == 'auLname'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='city', dir=${sortBy == 'city' && dir == 'asc' ? 'desc' : 'asc'}, status=${status}, city=${city}, state=${state})}" style="color: white; text-decoration: none;">City <span th:if="${sortBy == 'city'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='state', dir=${sortBy == 'state' && dir == 'asc' ? 'desc' : 'asc'}, status=${status}, city=${city}, state=${state})}" style="color: white; text-decoration: none;">State <span th:if="${sortBy == 'state'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='contract', dir=${sortBy == 'contract' && dir == 'asc' ? 'desc' : 'asc'}, status=${status}, city=${city}, state=${state})}" style="color: white; text-decoration: none;">Contract <span th:if="${sortBy == 'contract'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="author : ${authors}">
                    <td th:text="${author.auId}"></td>
                    <td th:text="${author.auFname}"></td>
                    <td th:text="${author.auLname}"></td>
                    <td th:text="${author.city}"></td>
                    <td th:text="${author.state}"></td>
                    <td th:text="${author.contract}"></td>
                </tr>
                <tr th:if="${totalItems == 0}">
                    <td colspan="6" style="text-align: center; color: #7f8c8d; padding: 20px;">No authors found.</td>
                </tr>
            </tbody>
        </table>

        <div th:if="${totalItems > 0}" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e1e8ed;">
            <span style="font-size: 14px; color: #34495e;">Page <strong th:text="${currentPage}"></strong> of <strong th:text="${totalPages}"></strong> (Total: <span th:text="${totalItems}"></span> records)</span>
            <div>
                <a th:if="${currentPage > 1}" th:href="@{${endpoint}(page=${currentPage - 1}, sortBy=${sortBy}, dir=${dir}, status=${status}, city=${city}, state=${state})}" class="btn" style="background: #bdc3c7; padding: 6px 15px; margin-right: 5px;">&laquo; Prev</a>
                <a th:if="${currentPage < totalPages}" th:href="@{${endpoint}(page=${currentPage + 1}, sortBy=${sortBy}, dir=${dir}, status=${status}, city=${city}, state=${state})}" class="btn btn-success" style="padding: 6px 15px;">Next &raquo;</a>
            </div>
        </div>
    </div>
</body>
</html>
