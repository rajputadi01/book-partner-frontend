<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Author Results')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        <a th:href="@{/web/authors/operations}" class="btn" style="margin-bottom: 15px;">&larr; Back to Menu</a>
        <table>
            <thead><tr><th>ID</th><th>First Name</th><th>Last Name</th><th>City</th><th>State</th><th>Contract</th></tr></thead>
            <tbody>
                <tr th:each="author : ${authors}">
                    <td th:text="${author.auId}"></td>
                    <td th:text="${author.auFname}"></td>
                    <td th:text="${author.auLname}"></td>
                    <td th:text="${author.city}"></td>
                    <td th:text="${author.state}"></td>
                    <td th:text="${author.contract}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
