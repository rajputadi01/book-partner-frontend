<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Input Parameter')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container" style="max-width: 500px; text-align: center;">
        <h2 th:text="${formTitle}"></h2>
        
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 15px; border-left: 5px solid #e74c3c; margin-bottom: 20px; font-weight: bold; text-align: left;" th:text="${errorMessage}"></div>
        
        <form th:action="${actionUrl}" method="get">
            <div class="form-group">
                <label>Target Author ID (XXX-XX-XXXX):</label>
                <input type="text" name="id" maxlength="11" required style="text-align: center; font-size: 18px; padding: 10px;">
            </div>
            <button type="submit" class="btn btn-success">Execute Request</button>
            <a th:href="@{/web/authors/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
