<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Author Details')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Author Details Record</h2>
        <div style="background: #fdfefe; padding: 20px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 20px;">
            <p><strong>ID:</strong> <span th:text="${author.auId}"></span></p>
            <p><strong>Name:</strong> <span th:text="${author.auFname + ' ' + author.auLname}"></span></p>
            <p><strong>Phone:</strong> <span th:text="${author.phone}"></span></p>
            <p><strong>Location:</strong> <span th:text="${author.address + ', ' + author.city + ', ' + author.state + ' ' + author.zip}"></span></p>
            <p><strong>Contract Active:</strong> <span th:text="${author.contract}"></span></p>
        </div>
        <a th:href="@{/web/authors/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Back to Menu</a>
        <a th:href="@{/web/authors/get-by-id}" class="btn btn-primary" style="margin-left: 10px;">Search Another Author</a>
    </div>
</body>
</html>
