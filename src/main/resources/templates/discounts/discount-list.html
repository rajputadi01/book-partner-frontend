<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Discount Results')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        <a th:href="@{/web/discounts/operations}" class="btn" style="margin-bottom: 15px;">&larr; Back to Menu</a>
        <table>
            <thead><tr><th>Discount Type</th><th>Store ID</th><th>Low Qty</th><th>High Qty</th><th>Amount (%)</th></tr></thead>
            <tbody>
                <tr th:each="discount : ${discounts}">
                    <td th:text="${discount.discountType}"></td>
                    <td>
                        <span th:if="${discount.store != null}" th:text="${discount.store.storId}"></span>
                        <span th:if="${discount.store == null}" style="color: #27ae60; font-weight: bold;">GLOBAL</span>
                    </td>
                    <td th:text="${discount.lowQty}"></td>
                    <td th:text="${discount.highQty}"></td>
                    <td th:text="${discount.discountAmount}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
