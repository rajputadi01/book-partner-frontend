<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Discount Results')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        
        <div style="margin-bottom: 20px;">
            <a th:href="@{/web/discounts/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Menu</a>
            <a th:if="${minQty != null}" th:href="@{/web/discounts/filter/qty}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Qty</a>
            <a th:if="${maxAmount != null}" th:href="@{/web/discounts/filter/amount}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Amount</a>
            <a th:if="${storId != null}" th:href="@{/web/discounts/filter/store}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Store</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='discountType', dir=${sortBy == 'discountType' && dir == 'asc' ? 'desc' : 'asc'}, minQty=${minQty}, maxQty=${maxQty}, maxAmount=${maxAmount}, storId=${storId})}" style="color: white; text-decoration: none;">Discount Type <span th:if="${sortBy == 'discountType'}" th:text="${dir == 'asc' ? 'в–І' : 'в–ј'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='storeId', dir=${sortBy == 'storeId' && dir == 'asc' ? 'desc' : 'asc'}, minQty=${minQty}, maxQty=${maxQty}, maxAmount=${maxAmount}, storId=${storId})}" style="color: white; text-decoration: none;">Store ID <span th:if="${sortBy == 'storeId'}" th:text="${dir == 'asc' ? 'в–І' : 'в–ј'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='lowQty', dir=${sortBy == 'lowQty' && dir == 'asc' ? 'desc' : 'asc'}, minQty=${minQty}, maxQty=${maxQty}, maxAmount=${maxAmount}, storId=${storId})}" style="color: white; text-decoration: none;">Low Qty <span th:if="${sortBy == 'lowQty'}" th:text="${dir == 'asc' ? 'в–І' : 'в–ј'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='highQty', dir=${sortBy == 'highQty' && dir == 'asc' ? 'desc' : 'asc'}, minQty=${minQty}, maxQty=${maxQty}, maxAmount=${maxAmount}, storId=${storId})}" style="color: white; text-decoration: none;">High Qty <span th:if="${sortBy == 'highQty'}" th:text="${dir == 'asc' ? 'в–І' : 'в–ј'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='discountAmount', dir=${sortBy == 'discountAmount' && dir == 'asc' ? 'desc' : 'asc'}, minQty=${minQty}, maxQty=${maxQty}, maxAmount=${maxAmount}, storId=${storId})}" style="color: white; text-decoration: none;">Amount (%) <span th:if="${sortBy == 'discountAmount'}" th:text="${dir == 'asc' ? 'в–І' : 'в–ј'}"></span></a></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="discount : ${discounts}">
                    <td th:text="${discount.discountType}"></td>
                    <td>
                        <span th:if="${discount.store != null}" th:text="${discount.store.storId}"></span>
                        <span th:if="${discount.store == null}" style="color: #27ae60; font-weight: bold;">GLOBAL</span>
                    </td>
                    <td th:text="${discount.lowQty}"></td>
                    <td th:text="${discount.highQty}"></td>
                    <td th:text="${discount.discountAmount}"></td>
                </tr>
                <tr th:if="${totalItems == 0}">
                    <td colspan="5" style="text-align: center; color: #7f8c8d; padding: 20px;">No records found.</td>
                </tr>
            </tbody>
        </table>

        <div th:if="${totalItems > 0}" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e1e8ed;">
            <span style="font-size: 14px; color: #34495e;">Page <strong th:text="${currentPage}"></strong> of <strong th:text="${totalPages}"></strong> (Total: <span th:text="${totalItems}"></span> records)</span>
            <div>
                <a th:if="${currentPage > 1}" th:href="@{${endpoint}(page=${currentPage - 1}, sortBy=${sortBy}, dir=${dir}, minQty=${minQty}, maxQty=${maxQty}, maxAmount=${maxAmount}, storId=${storId})}" class="btn" style="background: #bdc3c7; padding: 6px 15px; margin-right: 5px;">&laquo; Prev</a>
                <a th:if="${currentPage < totalPages}" th:href="@{${endpoint}(page=${currentPage + 1}, sortBy=${sortBy}, dir=${dir}, minQty=${minQty}, maxQty=${maxQty}, maxAmount=${maxAmount}, storId=${storId})}" class="btn btn-success" style="padding: 6px 15px;">Next &raquo;</a>
            </div>
        </div>
    </div>
</body>
</html>
