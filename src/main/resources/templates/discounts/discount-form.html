<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Discount Form')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${formTitle}"></h2>
        
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px; border-left: 4px solid #e74c3c;" th:text="${errorMessage}"></div>
        
        <form th:action="${actionUrl}" th:object="${discount}" method="post">
            <input type="hidden" name="isUpdate" th:value="${isUpdate}">
            
            <div class="form-group">
                <label>Discount Type (Primary Key):</label>
                <input type="text" th:field="*{discountType}" th:readonly="${isUpdate}" th:style="${isUpdate ? 'background-color: #eee;' : ''}">
                <span class="error" th:if="${#fields.hasErrors('discountType')}" th:errors="*{discountType}"></span>
            </div>
            
            <div class="form-group" style="padding: 10px; background: #e8f4f8; border-left: 4px solid #3498db; border-radius: 4px;">
                <label>Store ID (Leave entirely blank for a Global Discount):</label>
                <input type="text" th:field="*{store.storId}">
            </div>
            
            <div class="form-group">
                <label>Low Quantity Threshold:</label>
                <input type="number" th:field="*{lowQty}">
                <span class="error" th:if="${#fields.hasErrors('lowQty')}" th:errors="*{lowQty}"></span>
            </div>
            <div class="form-group">
                <label>High Quantity Threshold:</label>
                <input type="number" th:field="*{highQty}">
            </div>
            <div class="form-group">
                <label>Discount Amount (Percentage, e.g., 10.50):</label>
                <input type="number" step="0.01" th:field="*{discountAmount}">
                <span class="error" th:if="${#fields.hasErrors('discountAmount')}" th:errors="*{discountAmount}"></span>
            </div>

            <button type="submit" class="btn btn-success">Submit Payload</button>
            <a th:href="@{/web/discounts/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
