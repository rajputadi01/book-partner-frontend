<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Filter by Quantity')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container" style="max-width: 500px; text-align: center;">
        <h2>Execute: filterDiscountsByQty (GET)</h2>
        <form th:action="@{/web/discounts/filter/qty/result}" method="get">
            <div class="form-group">
                <label>Minimum Quantity:</label>
                <input type="number" name="minQty" required>
            </div>
            <div class="form-group">
                <label>Maximum Quantity:</label>
                <input type="number" name="maxQty" required>
            </div>
            <button type="submit" class="btn btn-success">Execute Filter</button>
            <a th:href="@{/web/discounts/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
