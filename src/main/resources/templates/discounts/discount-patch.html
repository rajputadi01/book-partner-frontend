<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Patch Discount')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container" style="max-width: 600px;">
        <h2 th:text="${formTitle}"></h2>
        <p style="color: #e67e22; font-weight: bold; margin-bottom: 20px;">Only fill in the fields you wish to change. Leave the rest blank.</p>
        
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px; border-left: 4px solid #e74c3c;" th:text="${errorMessage}"></div>

        <div style="background: #f8f9fa; padding: 15px; border: 1px solid #bdc3c7; border-radius: 5px; margin-bottom: 25px;">
            <h4 style="margin-top: 0; border-bottom: 1px solid #ccc; padding-bottom: 5px; color: #2c3e50;">Current Database Record</h4>
            <p style="margin: 5px 0;"><strong>Discount Type:</strong> <span th:text="${currentDiscount.discountType}"></span></p>
            <p style="margin: 5px 0;"><strong>Applies to Store:</strong> 
                <span th:if="${currentDiscount.store != null}" th:text="${currentDiscount.store.storId}"></span>
                <span th:if="${currentDiscount.store == null}" style="color: #27ae60; font-weight: bold;">Global</span>
            </p>
            <p style="margin: 5px 0;"><strong>Low Qty:</strong> <span th:text="${currentDiscount.lowQty}"></span></p>
            <p style="margin: 5px 0;"><strong>High Qty:</strong> <span th:text="${currentDiscount.highQty}"></span></p>
            <p style="margin: 5px 0;"><strong>Amount:</strong> <span th:text="${currentDiscount.discountAmount}"></span>%</p>
        </div>

        <form th:action="${actionUrl}" th:object="${discount}" method="post">
            <input type="hidden" th:field="*{discountType}">

            <div class="form-group" style="padding: 10px; background: #e8f4f8; border-left: 4px solid #3498db; border-radius: 4px;">
                <label>New Store ID (Leave entirely blank for a Global Discount):</label>
                <input type="text" th:field="*{store.storId}" placeholder="Leave blank to keep current">
            </div>
            
            <div class="form-group">
                <label>New Low Quantity (Optional):</label>
                <input type="number" th:field="*{lowQty}" placeholder="Leave blank to keep current">
            </div>
            <div class="form-group">
                <label>New High Quantity (Optional):</label>
                <input type="number" th:field="*{highQty}" placeholder="Leave blank to keep current">
            </div>
            <div class="form-group">
                <label>New Discount Amount % (Optional):</label>
                <input type="number" step="0.01" th:field="*{discountAmount}" placeholder="Leave blank to keep current">
            </div>

            <button type="submit" class="btn btn-success" style="margin-top: 10px;">Submit Patch Payload</button>
            <a th:href="@{/web/discounts/operations}" class="btn btn-danger" style="margin-top: 10px;">Cancel</a>
        </form>
    </div>
</body>
</html>
