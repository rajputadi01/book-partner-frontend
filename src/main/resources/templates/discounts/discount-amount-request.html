<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Filter by Amount')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container" style="max-width: 500px; text-align: center;">
        <h2>Execute: filterDiscountsByAmount (GET)</h2>
        
		<div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 15px; border-left: 5px solid #e74c3c; margin-bottom: 20px; font-weight: bold; text-align: left;" th:text="${errorMessage}"></div>
		
		<form th:action="@{/web/discounts/filter/amount/result}" method="get">
            <div class="form-group">
                <label>Max Discount Amount (%):</label>
                <input type="number" step="0.01" name="maxAmount" required style="text-align: center; font-size: 18px;">
            </div>
            <button type="submit" class="btn btn-success">Execute Filter</button>
            <a th:href="@{/web/discounts/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
