<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Input Parameter')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container" style="max-width: 500px; text-align: center;">
        <h2>Filter Discounts by Store</h2>
        
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 15px; border-left: 5px solid #e74c3c; margin-bottom: 20px; font-weight: bold; text-align: left;" th:text="${errorMessage}"></div>
        
        <form th:action="@{/web/discounts/filter/store/result}" method="get">
            <div class="form-group">
                <label>Store ID:</label>
                <input type="text" name="storId" required style="text-align: center; font-size: 18px; padding: 10px;">
            </div>
            <button type="submit" class="btn btn-success">Execute Request</button>
            <a th:href="@{/web/discounts/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
