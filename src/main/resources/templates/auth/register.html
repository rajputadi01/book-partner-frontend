<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Register')}"></head>
<body>
    <div class="container" style="max-width: 420px; margin-top: 80px; padding: 0; background: transparent; box-shadow: none;">
        <div class="card" style="padding: 40px;">
            <div style="text-align: center; color: #2ecc71; margin-bottom: 15px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            </div>
            <h2 style="text-align: center; margin-top: 0; margin-bottom: 25px;">Register Account</h2>
            
            <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 14px; font-weight: 600; text-align: center;" th:text="${errorMessage}"></div>

            <form th:action="@{/register/save}" method="post">
                <div class="form-group">
                    <label>Choose Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Choose Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 15px; padding: 12px; font-size: 16px;">Register as Staff</button>
            </form>
            
            <p style="text-align: center; margin-top: 25px; font-size: 14px;">
                Already have an account? <a th:href="@{/login}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Back to Login</a>
            </p>
        </div>
    </div>
</body>
</html>
