<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Login')}"></head>
<body>
    <div class="container" style="max-width: 420px; margin-top: 80px; padding: 0; background: transparent; box-shadow: none;">
        <div class="card" style="padding: 40px;">
            <div style="text-align: center; color: var(--primary); margin-bottom: 15px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            </div>
            <h2 style="text-align: center; margin-top: 0; margin-bottom: 25px;">Portal Login</h2>
            
            <div th:if="${param.error}" style="background: #f8d7da; color: #721c24; padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 14px; font-weight: 600; text-align: center;">Invalid username or password.</div>
            <div th:if="${param.logout}" style="background: #d4edda; color: #155724; padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 14px; font-weight: 600; text-align: center;">You have been logged out.</div>
            <div th:if="${successMessage != null}" style="background: #d4edda; color: #155724; padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 14px; font-weight: 600; text-align: center;" th:text="${successMessage}"></div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 15px; padding: 12px; font-size: 16px;">Secure Login</button>
            </form>
            
            <p style="text-align: center; margin-top: 25px; font-size: 14px;">
                Don't have an account? <a th:href="@{/register}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Register here</a>
            </p>
        </div>
    </div>
</body>
</html>
