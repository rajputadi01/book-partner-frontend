<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Publishers for Job')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Publishers Employing Job ID: <span th:text="${targetId}"></span></h2>
        
        <div style="margin-bottom: 20px;">
            <a th:href="@{/web/jobs/operations}" class="btn" style="background: #95a5a6; color: white;">&larr; Menu</a>
            <a th:href="@{/web/jobs/publishers}" class="btn btn-primary" style="margin-left: 10px;">Search Another Job ID</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='pubId', dir=${sortBy == 'pubId' && dir == 'asc' ? 'desc' : 'asc'}, id=${targetId})}" style="color: white; text-decoration: none;">Pub ID <span th:if="${sortBy == 'pubId'}" th:text="${dir == 'asc' ? 'â–˛' : 'â–Ľ'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='pubName', dir=${sortBy == 'pubName' && dir == 'asc' ? 'desc' : 'asc'}, id=${targetId})}" style="color: white; text-decoration: none;">Publisher Name <span th:if="${sortBy == 'pubName'}" th:text="${dir == 'asc' ? 'â–˛' : 'â–Ľ'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='city', dir=${sortBy == 'city' && dir == 'asc' ? 'desc' : 'asc'}, id=${targetId})}" style="color: white; text-decoration: none;">City <span th:if="${sortBy == 'city'}" th:text="${dir == 'asc' ? 'â–˛' : 'â–Ľ'}"></span></a></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="pub : ${publishers}">
                    <td th:text="${pub.pubId}"></td>
                    <td th:text="${pub.pubName}"></td>
                    <td th:text="${pub.city}"></td>
                </tr>
                <tr th:if="${totalItems == 0}">
                    <td colspan="3" style="text-align: center; color: #7f8c8d; padding: 20px;">No publishers found using this job.</td>
                </tr>
            </tbody>
        </table>

        <div th:if="${totalItems > 0}" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e1e8ed;">
            <span style="font-size: 14px; color: #34495e;">Page <strong th:text="${currentPage}"></strong> of <strong th:text="${totalPages}"></strong> (Total: <span th:text="${totalItems}"></span> records)</span>
            <div>
                <a th:if="${currentPage > 1}" th:href="@{${endpoint}(page=${currentPage - 1}, sortBy=${sortBy}, dir=${dir}, id=${targetId})}" class="btn" style="background: #bdc3c7; padding: 6px 15px; margin-right: 5px;">&laquo; Prev</a>
                <a th:if="${currentPage < totalPages}" th:href="@{${endpoint}(page=${currentPage + 1}, sortBy=${sortBy}, dir=${dir}, id=${targetId})}" class="btn btn-success" style="padding: 6px 15px;">Next &raquo;</a>
            </div>
        </div>
    </div>
</body>
</html>
