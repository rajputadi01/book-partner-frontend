<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Sales Results')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        
        <div style="margin-bottom: 20px;">
            <a th:href="@{/web/sales/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Menu</a>
            <a th:if="${storId != null}" th:href="@{/web/sales/filter/store}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Store</a>
            <a th:if="${titleId != null}" th:href="@{/web/sales/filter/title}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Title</a>
            <a th:if="${terms != null}" th:href="@{/web/sales/filter/payterms}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Terms</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='storId', dir=${sortBy == 'storId' && dir == 'asc' ? 'desc' : 'asc'}, storId=${storId}, titleId=${titleId}, terms=${terms})}" style="color: white; text-decoration: none;">Store ID <span th:if="${sortBy == 'storId'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='ordNum', dir=${sortBy == 'ordNum' && dir == 'asc' ? 'desc' : 'asc'}, storId=${storId}, titleId=${titleId}, terms=${terms})}" style="color: white; text-decoration: none;">Order # <span th:if="${sortBy == 'ordNum'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='titleId', dir=${sortBy == 'titleId' && dir == 'asc' ? 'desc' : 'asc'}, storId=${storId}, titleId=${titleId}, terms=${terms})}" style="color: white; text-decoration: none;">Title ID <span th:if="${sortBy == 'titleId'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='ordDate', dir=${sortBy == 'ordDate' && dir == 'asc' ? 'desc' : 'asc'}, storId=${storId}, titleId=${titleId}, terms=${terms})}" style="color: white; text-decoration: none;">Date <span th:if="${sortBy == 'ordDate'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='qty', dir=${sortBy == 'qty' && dir == 'asc' ? 'desc' : 'asc'}, storId=${storId}, titleId=${titleId}, terms=${terms})}" style="color: white; text-decoration: none;">Qty <span th:if="${sortBy == 'qty'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='payterms', dir=${sortBy == 'payterms' && dir == 'asc' ? 'desc' : 'asc'}, storId=${storId}, titleId=${titleId}, terms=${terms})}" style="color: white; text-decoration: none;">Pay Terms <span th:if="${sortBy == 'payterms'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="sale : ${salesList}">
                    <td th:text="${sale.store.storId}"></td>
                    <td th:text="${sale.ordNum}"></td>
                    <td th:text="${sale.title.titleId}"></td>
                    <td th:text="${#temporals.format(sale.ordDate, 'yyyy-MM-dd')}"></td>
                    <td th:text="${sale.qty}"></td>
                    <td th:text="${sale.payterms}"></td>
                </tr>
                <tr th:if="${totalItems == 0}">
                    <td colspan="6" style="text-align: center; color: #7f8c8d; padding: 20px;">No sales transactions found.</td>
                </tr>
            </tbody>
        </table>

        <div th:if="${totalItems > 0}" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e1e8ed;">
            <span style="font-size: 14px; color: #34495e;">Page <strong th:text="${currentPage}"></strong> of <strong th:text="${totalPages}"></strong> (Total: <span th:text="${totalItems}"></span> records)</span>
            <div>
                <a th:if="${currentPage > 1}" th:href="@{${endpoint}(page=${currentPage - 1}, sortBy=${sortBy}, dir=${dir}, storId=${storId}, titleId=${titleId}, terms=${terms})}" class="btn" style="background: #bdc3c7; padding: 6px 15px; margin-right: 5px;">&laquo; Prev</a>
                <a th:if="${currentPage < totalPages}" th:href="@{${endpoint}(page=${currentPage + 1}, sortBy=${sortBy}, dir=${dir}, storId=${storId}, titleId=${titleId}, terms=${terms})}" class="btn btn-success" style="padding: 6px 15px;">Next &raquo;</a>
            </div>
        </div>
    </div>
</body>
</html>
