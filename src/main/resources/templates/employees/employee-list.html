<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Employee Results')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        
        <div style="margin-bottom: 20px;">
            <a th:href="@{/web/employees/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Menu</a>
            <a th:if="${jobId != null}" th:href="@{/web/employees/filter/job}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Job</a>
            <a th:if="${maxLvl != null}" th:href="@{/web/employees/filter/job-level}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Level</a>
            <a th:if="${pubId != null}" th:href="@{/web/employees/filter/publisher}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Publisher</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='empId', dir=${sortBy == 'empId' && dir == 'asc' ? 'desc' : 'asc'}, jobId=${jobId}, maxLvl=${maxLvl}, pubId=${pubId})}" style="color: white; text-decoration: none;">ID <span th:if="${sortBy == 'empId'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='fname', dir=${sortBy == 'fname' && dir == 'asc' ? 'desc' : 'asc'}, jobId=${jobId}, maxLvl=${maxLvl}, pubId=${pubId})}" style="color: white; text-decoration: none;">First Name <span th:if="${sortBy == 'fname'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='lname', dir=${sortBy == 'lname' && dir == 'asc' ? 'desc' : 'asc'}, jobId=${jobId}, maxLvl=${maxLvl}, pubId=${pubId})}" style="color: white; text-decoration: none;">Last Name <span th:if="${sortBy == 'lname'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='jobId', dir=${sortBy == 'jobId' && dir == 'asc' ? 'desc' : 'asc'}, jobId=${jobId}, maxLvl=${maxLvl}, pubId=${pubId})}" style="color: white; text-decoration: none;">Job ID <span th:if="${sortBy == 'jobId'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='jobLvl', dir=${sortBy == 'jobLvl' && dir == 'asc' ? 'desc' : 'asc'}, jobId=${jobId}, maxLvl=${maxLvl}, pubId=${pubId})}" style="color: white; text-decoration: none;">Job Lvl <span th:if="${sortBy == 'jobLvl'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='pubId', dir=${sortBy == 'pubId' && dir == 'asc' ? 'desc' : 'asc'}, jobId=${jobId}, maxLvl=${maxLvl}, pubId=${pubId})}" style="color: white; text-decoration: none;">Pub ID <span th:if="${sortBy == 'pubId'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span></a></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="emp : ${employees}">
                    <td th:text="${emp.empId}"></td>
                    <td th:text="${emp.fname}"></td>
                    <td th:text="${emp.lname}"></td>
                    <td th:text="${emp.job != null ? emp.job.jobId : ''}"></td>
                    <td th:text="${emp.jobLvl}"></td>
                    <td th:text="${emp.publisher != null ? emp.publisher.pubId : ''}"></td>
                </tr>
                <tr th:if="${totalItems == 0}">
                    <td colspan="6" style="text-align: center; color: #7f8c8d; padding: 20px;">No records found.</td>
                </tr>
            </tbody>
        </table>

        <div th:if="${totalItems > 0}" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e1e8ed;">
            <span style="font-size: 14px; color: #34495e;">Page <strong th:text="${currentPage}"></strong> of <strong th:text="${totalPages}"></strong> (Total: <span th:text="${totalItems}"></span> records)</span>
            <div>
                <a th:if="${currentPage > 1}" th:href="@{${endpoint}(page=${currentPage - 1}, sortBy=${sortBy}, dir=${dir}, jobId=${jobId}, maxLvl=${maxLvl}, pubId=${pubId})}" class="btn" style="background: #bdc3c7; padding: 6px 15px; margin-right: 5px;">&laquo; Prev</a>
                <a th:if="${currentPage < totalPages}" th:href="@{${endpoint}(page=${currentPage + 1}, sortBy=${sortBy}, dir=${dir}, jobId=${jobId}, maxLvl=${maxLvl}, pubId=${pubId})}" class="btn btn-success" style="padding: 6px 15px;">Next &raquo;</a>
            </div>
        </div>
    </div>
</body>
</html>
