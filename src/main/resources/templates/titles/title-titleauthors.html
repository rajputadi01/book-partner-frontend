<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Contracts & Splits')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Contracts & Splits for Title ID: <span th:text="${targetId}"></span></h2>
        
        <div style="margin-bottom: 20px;">
            <a th:href="@{/web/titles/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Menu</a>
            <a th:href="@{/web/titles/relational/title-authors}" class="btn btn-primary" style="margin-left: 10px;">Search Another Title</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='auId', dir=${sortBy == 'auId' && dir == 'asc' ? 'desc' : 'asc'}, id=${id})}" style="color: white; text-decoration: none;">Author ID <span th:if="${sortBy == 'auId'}" th:text="${dir == 'asc' ? 'â–˛' : 'â–Ľ'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='auOrd', dir=${sortBy == 'auOrd' && dir == 'asc' ? 'desc' : 'asc'}, id=${id})}" style="color: white; text-decoration: none;">Order Status <span th:if="${sortBy == 'auOrd'}" th:text="${dir == 'asc' ? 'â–˛' : 'â–Ľ'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='royaltyPer', dir=${sortBy == 'royaltyPer' && dir == 'asc' ? 'desc' : 'asc'}, id=${id})}" style="color: white; text-decoration: none;">Royalty Split (%) <span th:if="${sortBy == 'royaltyPer'}" th:text="${dir == 'asc' ? 'â–˛' : 'â–Ľ'}"></span></a></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ta : ${titleAuthors}">
                    <td th:text="${ta.author.auId}"></td>
                    <td th:text="${ta.auOrd}"></td>
                    <td th:text="${ta.royaltyPer}"></td>
                </tr>
                <tr th:if="${totalItems == 0}">
                    <td colspan="3" style="text-align: center; color: #7f8c8d; padding: 20px;">No author contracts found for this title.</td>
                </tr>
            </tbody>
        </table>

        <div th:if="${totalItems > 0}" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e1e8ed;">
            <span style="font-size: 14px; color: #34495e;">Page <strong th:text="${currentPage}"></strong> of <strong th:text="${totalPages}"></strong> (Total: <span th:text="${totalItems}"></span> records)</span>
            <div>
                <a th:if="${currentPage > 1}" th:href="@{${endpoint}(page=${currentPage - 1}, sortBy=${sortBy}, dir=${dir}, id=${id})}" class="btn" style="background: #bdc3c7; padding: 6px 15px; margin-right: 5px;">&laquo; Prev</a>
                <a th:if="${currentPage < totalPages}" th:href="@{${endpoint}(page=${currentPage + 1}, sortBy=${sortBy}, dir=${dir}, id=${id})}" class="btn btn-success" style="padding: 6px 15px;">Next &raquo;</a>
            </div>
        </div>
    </div>
</body>
</html>
