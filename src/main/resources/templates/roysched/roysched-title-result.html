<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Associated Title')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Title Linked to Schedule ID: <span th:text="${targetId}"></span></h2>
        
        <div style="margin-bottom: 20px;">
            <a th:href="@{/web/roysched/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Menu</a>
            <a th:href="@{/web/roysched/title}" class="btn btn-primary" style="margin-left: 10px;">Search Another Schedule</a>
        </div>

        <table>
            <thead><tr><th>Title ID</th><th>Book Name</th><th>Type</th><th>Price</th></tr></thead>
            <tbody>
                <tr>
                    <td th:text="${title.titleId}"></td>
                    <td th:text="${title.titleName}"></td>
                    <td th:text="${title.type}"></td>
                    <td th:text="${title.price}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
