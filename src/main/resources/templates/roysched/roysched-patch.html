<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Patch Royalty Schedule')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container" style="max-width: 600px;">
        <h2 th:text="${formTitle}"></h2>
        <p style="color: #e67e22; font-weight: bold; margin-bottom: 20px;">Only fill in the fields you wish to change. Leave the rest blank.</p>
        
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px; border-left: 4px solid #e74c3c;" th:text="${errorMessage}"></div>

        <div style="background: #f8f9fa; padding: 15px; border: 1px solid #bdc3c7; border-radius: 5px; margin-bottom: 25px;">
            <h4 style="margin-top: 0; border-bottom: 1px solid #ccc; padding-bottom: 5px; color: #2c3e50;">Current Database Record</h4>
            <p style="margin: 5px 0;"><strong>Schedule ID:</strong> <span th:text="${currentRecord.royschedId}"></span></p>
            <p style="margin: 5px 0;"><strong>Linked Title ID:</strong> <span th:text="${currentRecord.title.titleId}"></span></p>
            <hr>
            <p style="margin: 5px 0;"><strong>Low Sales Range:</strong> <span th:text="${currentRecord.lorange}"></span></p>
            <p style="margin: 5px 0;"><strong>High Sales Range:</strong> <span th:text="${currentRecord.hirange}"></span></p>
            <p style="margin: 5px 0;"><strong>Royalty %:</strong> <span th:text="${currentRecord.royalty}"></span></p>
        </div>

        <form th:action="${actionUrl}" th:object="${schedule}" method="post">
            <input type="hidden" th:field="*{royschedId}">
            
            <div class="form-group" style="padding: 10px; background: #e8f4f8; border-left: 4px solid #3498db; border-radius: 4px;">
                <label>New Linked Title ID (Optional):</label>
                <input type="text" th:field="*{title.titleId}" placeholder="Leave blank to keep current">
            </div>

            <div class="form-group">
                <label>New Low Sales Range (Optional):</label>
                <input type="number" th:field="*{lorange}" placeholder="Leave blank to keep current">
            </div>
            <div class="form-group">
                <label>New High Sales Range (Optional):</label>
                <input type="number" th:field="*{hirange}" placeholder="Leave blank to keep current">
            </div>
            <div class="form-group">
                <label>New Royalty Percentage (Optional):</label>
                <input type="number" th:field="*{royalty}" placeholder="Leave blank to keep current">
            </div>

            <button type="submit" class="btn btn-success" style="margin-top: 10px;">Submit Patch Payload</button>
            <a th:href="@{/web/roysched/operations}" class="btn btn-danger" style="margin-top: 10px;">Cancel</a>
        </form>
    </div>
</body>
</html>
