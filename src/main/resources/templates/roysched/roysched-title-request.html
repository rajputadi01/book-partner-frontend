<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Filter by Title')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container" style="max-width: 500px; text-align: center;">
        <h2>Execute: getRoyaltySchedulesByTitleId (GET)</h2>
        <form th:action="@{/web/roysched/filter/title/result}" method="get">
            <div class="form-group">
                <label>Target Title ID:</label>
                <input type="text" name="titleId" required style="text-align: center; font-size: 18px;">
            </div>
            <button type="submit" class="btn btn-success">Execute Filter</button>
            <a th:href="@{/web/roysched/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
