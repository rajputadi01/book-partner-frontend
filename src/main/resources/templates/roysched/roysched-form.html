<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Royalty Schedule Form')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${formTitle}"></h2>
        
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px; border-left: 4px solid #e74c3c;" th:text="${errorMessage}"></div>
        
        <form th:action="${actionUrl}" th:object="${schedule}" method="post">
            <div class="form-group" th:if="${isUpdate}">
                <label>Schedule ID (Primary Key):</label>
                <input type="number" th:field="*{royschedId}" readonly style="background-color: #eee;">
            </div>
            
            <div class="form-group" style="padding: 10px; background: #e8f4f8; border-left: 4px solid #3498db; border-radius: 4px;">
                <label>Target Title ID:</label>
                <input type="text" th:field="*{title.titleId}">
                <span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>
            <div class="form-group">
                <label>Low Sales Range:</label>
                <input type="number" th:field="*{lorange}">
                <span class="error" th:if="${#fields.hasErrors('lorange')}" th:errors="*{lorange}"></span>
            </div>
            <div class="form-group">
                <label>High Sales Range:</label>
                <input type="number" th:field="*{hirange}">
                <span class="error" th:if="${#fields.hasErrors('hirange')}" th:errors="*{hirange}"></span>
            </div>
            <div class="form-group">
                <label>Royalty Percentage:</label>
                <input type="number" th:field="*{royalty}">
                <span class="error" th:if="${#fields.hasErrors('royalty')}" th:errors="*{royalty}"></span>
            </div>

            <button type="submit" class="btn btn-success">Submit Payload</button>
            <a th:href="@{/web/roysched/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
