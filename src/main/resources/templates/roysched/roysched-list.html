<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Royalty Schedule Results')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        
        <div style="margin-bottom: 20px;">
            <a th:href="@{/web/roysched/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Menu</a>
            <a th:if="${minLorange != null}" th:href="@{/web/roysched/filter/range}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Range</a>
            <a th:if="${titleId != null}" th:href="@{/web/roysched/filter/title}" class="btn btn-primary" style="margin-left: 10px;">Filter Another Title</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='royschedId', dir=${sortBy == 'royschedId' && dir == 'asc' ? 'desc' : 'asc'}, minLorange=${minLorange}, maxHirange=${maxHirange}, titleId=${titleId})}" style="color: white; text-decoration: none;">Schedule ID <span th:if="${sortBy == 'royschedId'}" th:text="${dir == 'asc' ? 'в–І' : 'в–ј'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='titleId', dir=${sortBy == 'titleId' && dir == 'asc' ? 'desc' : 'asc'}, minLorange=${minLorange}, maxHirange=${maxHirange}, titleId=${titleId})}" style="color: white; text-decoration: none;">Title ID <span th:if="${sortBy == 'titleId'}" th:text="${dir == 'asc' ? 'в–І' : 'в–ј'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='lorange', dir=${sortBy == 'lorange' && dir == 'asc' ? 'desc' : 'asc'}, minLorange=${minLorange}, maxHirange=${maxHirange}, titleId=${titleId})}" style="color: white; text-decoration: none;">Low Range <span th:if="${sortBy == 'lorange'}" th:text="${dir == 'asc' ? 'в–І' : 'в–ј'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='hirange', dir=${sortBy == 'hirange' && dir == 'asc' ? 'desc' : 'asc'}, minLorange=${minLorange}, maxHirange=${maxHirange}, titleId=${titleId})}" style="color: white; text-decoration: none;">High Range <span th:if="${sortBy == 'hirange'}" th:text="${dir == 'asc' ? 'в–І' : 'в–ј'}"></span></a></th>
                    <th><a th:href="@{${endpoint}(page=1, sortBy='royalty', dir=${sortBy == 'royalty' && dir == 'asc' ? 'desc' : 'asc'}, minLorange=${minLorange}, maxHirange=${maxHirange}, titleId=${titleId})}" style="color: white; text-decoration: none;">Royalty % <span th:if="${sortBy == 'royalty'}" th:text="${dir == 'asc' ? 'в–І' : 'в–ј'}"></span></a></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="schedule : ${schedules}">
                    <td th:text="${schedule.royschedId}"></td>
                    <td th:text="${schedule.title.titleId}"></td>
                    <td th:text="${schedule.lorange}"></td>
                    <td th:text="${schedule.hirange}"></td>
                    <td th:text="${schedule.royalty}"></td>
                </tr>
                <tr th:if="${totalItems == 0}">
                    <td colspan="5" style="text-align: center; color: #7f8c8d; padding: 20px;">No schedules found.</td>
                </tr>
            </tbody>
        </table>

        <div th:if="${totalItems > 0}" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e1e8ed;">
            <span style="font-size: 14px; color: #34495e;">Page <strong th:text="${currentPage}"></strong> of <strong th:text="${totalPages}"></strong> (Total: <span th:text="${totalItems}"></span> records)</span>
            <div>
                <a th:if="${currentPage > 1}" th:href="@{${endpoint}(page=${currentPage - 1}, sortBy=${sortBy}, dir=${dir}, minLorange=${minLorange}, maxHirange=${maxHirange}, titleId=${titleId})}" class="btn" style="background: #bdc3c7; padding: 6px 15px; margin-right: 5px;">&laquo; Prev</a>
                <a th:if="${currentPage < totalPages}" th:href="@{${endpoint}(page=${currentPage + 1}, sortBy=${sortBy}, dir=${dir}, minLorange=${minLorange}, maxHirange=${maxHirange}, titleId=${titleId})}" class="btn btn-success" style="padding: 6px 15px;">Next &raquo;</a>
            </div>
        </div>
    </div>
</body>
</html>
