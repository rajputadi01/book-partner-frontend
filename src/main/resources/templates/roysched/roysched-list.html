<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Royalty Schedule Results')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        <a th:href="@{/web/roysched/operations}" class="btn" style="margin-bottom: 15px;">&larr; Menu</a>
        <table>
            <thead><tr><th>Schedule ID</th><th>Title ID</th><th>Low Range</th><th>High Range</th><th>Royalty %</th></tr></thead>
            <tbody>
                <tr th:each="schedule : ${schedules}">
                    <td th:text="${schedule.royschedId}"></td>
                    <td th:text="${schedule.title.titleId}"></td>
                    <td th:text="${schedule.lorange}"></td>
                    <td th:text="${schedule.hirange}"></td>
                    <td th:text="${schedule.royalty}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
