<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Schedule Details')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Schedule Details Record</h2>
        <div style="background: #fdfefe; padding: 20px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 20px;">
            <p><strong>Schedule ID:</strong> <span th:text="${schedule.royschedId}"></span></p>
            <p><strong>Title ID:</strong> <span th:text="${schedule.title.titleId}"></span></p>
            <hr>
            <p><strong>Sales Low Range:</strong> <span th:text="${schedule.lorange}"></span></p>
            <p><strong>Sales High Range:</strong> <span th:text="${schedule.hirange}"></span></p>
            <p><strong>Royalty Payout:</strong> <span th:text="${schedule.royalty}"></span>%</p>
        </div>
        <a th:href="@{/web/roysched/operations}" class="btn" style="background-color: #7f8c8d; color: white;">&larr; Back to Menu</a>
        <a th:href="@{/web/roysched/get-by-id}" class="btn btn-primary" style="margin-left: 10px;">Search Another Schedule</a>
    </div>
</body>
</html>
