<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Filter by Range')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container" style="max-width: 500px; text-align: center;">
        <h2>Execute: getRoyaltySchedulesByRange (GET)</h2>
        
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 15px; border-left: 5px solid #e74c3c; margin-bottom: 20px; font-weight: bold; text-align: left;" th:text="${errorMessage}"></div>
        
        <form th:action="@{/web/roysched/filter/range/result}" method="get">
            <div class="form-group">
                <label>Minimum Low Range:</label>
                <input type="number" name="minLorange" required style="padding: 10px;">
            </div>
            <div class="form-group">
                <label>Maximum High Range:</label>
                <input type="number" name="maxHirange" required style="padding: 10px;">
            </div>
            <button type="submit" class="btn btn-success">Execute Filter</button>
            <a th:href="@{/web/roysched/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
