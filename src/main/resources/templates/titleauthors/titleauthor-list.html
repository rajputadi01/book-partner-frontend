<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('TitleAuthor Results')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        <a th:href="@{/web/titleauthors/operations}" class="btn" style="margin-bottom: 15px;">&larr; Menu</a>
        <table>
            <thead><tr><th>Author ID</th><th>Title ID</th><th>Author Order</th><th>Royalty %</th></tr></thead>
            <tbody>
                <tr th:each="ta : ${titleAuthors}">
                    <td th:text="${ta.author.auId}"></td>
                    <td th:text="${ta.title.titleId}"></td>
                    <td th:text="${ta.auOrd}"></td>
                    <td th:text="${ta.royaltyPer}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
