<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Input Composite Key')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container" style="max-width: 500px; text-align: center;">
        <h2 th:text="${formTitle}"></h2>
        <p style="color: #7f8c8d; margin-bottom: 20px;">This entity uses a Dual Composite Key.</p>
        <form th:action="${actionUrl}" method="get">
            <div class="form-group">
                <label>Author ID:</label>
                <input type="text" name="auId" required style="text-align: center; font-size: 16px;">
            </div>
            <div class="form-group">
                <label>Title ID:</label>
                <input type="text" name="titleId" required style="text-align: center; font-size: 16px;">
            </div>
            <button type="submit" class="btn btn-success">Execute Request</button>
            <a th:href="@{/web/titleauthors/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
